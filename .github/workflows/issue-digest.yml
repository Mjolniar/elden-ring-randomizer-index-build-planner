name: Weekly Issue Digest

# Runs every Sunday at 9:17 AM UTC.
# Can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '17 9 * * 0'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create or update weekly digest issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")

          # ── Ensure the digest label exists ──────────────────────────────────
          gh api repos/$REPO/labels \
            --method POST \
            --field name="digest" \
            --field color="0075ca" \
            --field description="Automated weekly issue digest" \
            2>/dev/null || true   # ignore 422 if label already exists

          # ── Fetch open issues, excluding previous digest issues ──────────────
          ISSUES=$(gh api "repos/$REPO/issues?state=open&per_page=100" \
            --jq '[.[] | select(.pull_request == null) | select(.labels | map(.name) | contains(["digest"]) | not)]')

          COUNT=$(echo "$ISSUES" | jq 'length')

          # ── Build the issue body ─────────────────────────────────────────────
          if [ "$COUNT" -eq 0 ]; then
            BODY="No open issues as of $DATE. All clear. ✅"
          else
            # Separate bugs from suggestions/other
            BUGS=$(echo "$ISSUES" | jq -r \
              '[.[] | select(.labels | map(.name) | contains(["bug"]))] |
               if length == 0 then ""
               else "### 🐛 Bugs (" + (length | tostring) + ")\n" +
                    (map("- [#\(.number) — \(.title)](\(.html_url))") | join("\n")) + "\n"
               end')

            OTHER=$(echo "$ISSUES" | jq -r \
              '[.[] | select(.labels | map(.name) | contains(["bug"]) | not)] |
               if length == 0 then ""
               else "### 💡 Suggestions & other (" + (length | tostring) + ")\n" +
                    (map("- [#\(.number) — \(.title)](\(.html_url))") | join("\n")) + "\n"
               end')

            BODY="## Open Issues — $DATE

Total open: **$COUNT**

${BUGS}${OTHER}
---
_Close this issue when you've reviewed it. A new digest will be posted next Sunday._"
          fi

          # ── Close any previously open digest issues ──────────────────────────
          PREV=$(gh api "repos/$REPO/issues?state=open&labels=digest&per_page=10" \
            --jq '.[].number')
          for NUM in $PREV; do
            gh issue close "$NUM" --repo "$REPO" 2>/dev/null || true
          done

          # ── Open the new digest issue ────────────────────────────────────────
          gh issue create \
            --repo "$REPO" \
            --title "Weekly Issue Digest — $DATE" \
            --body "$BODY" \
            --label "digest"
